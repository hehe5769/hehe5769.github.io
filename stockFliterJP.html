<!DOCTYPE html>
<html lang="ja-JP">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JP Stock AI - 日本株詳細スクリーニング</title>
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🇯🇵</text></svg>">
    <link rel="stylesheet" href="css/stock.css">
    <!-- SheetJS for Excel parsing -->
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
</head>

<body>
    <div class="container">
        <header>
            <div class="logo">JP 日本株 AI</div>
            <p class="subtitle">経済的な堀(Moat)評価とテクニカル分析に基づく詳細スクリーニングシステム</p>
        </header>

        <main>
            <section class="upload-section">
                <div class="upload-box" id="drop-zone">
                    <input type="file" id="file-input" accept=".xlsx, .xls" hidden>
                    <label for="file-input" class="upload-label">
                        <span class="icon">📂</span>
                        <span class="text">Excelファイルをアップロード (Stock.xlsx / Nikkei225.xlsx)</span>
                        <span class="sub-text">またはファイルをここにドラッグ＆ドロップ</span>
                    </label>
                </div>
                <div id="error-message" class="error-message" style="display: none;"></div>

                <div style="text-align: center; margin-top: 1rem;">
                    <button id="test-file-btn" class="btn-text">🧪 テストデータを使用 (stockTest.xlsx)</button>
                </div>
            </section>

            <section id="loading-section" class="loading-section" style="display: none;">
                <div class="spinner"></div>
                <p>AI詳細分析を実行中、少々お待ちください...</p>
            </section>

            <section id="results-section" class="results-section" style="display: none;">
                <div class="metrics-grid">
                    <div class="metric-card">
                        <h3>分析銘柄数</h3>
                        <div class="value" id="metric-total">0</div>
                    </div>
                    <div class="metric-card highlight">
                        <h3>高確率 (>70%)</h3>
                        <div class="value" id="metric-high-prob">0</div>
                    </div>
                    <div class="metric-card">
                        <h3>優良な堀(Moat)</h3>
                        <div class="value" id="metric-high-moat">0</div>
                    </div>
                </div>

                <div class="actions-bar">
                    <input type="text" id="search-input" placeholder="🔍 銘柄コードまたは名称で検索...">
                    <button id="download-btn" class="btn primary">📥 分析レポートをダウンロード (CSV)</button>
                </div>

                <div class="table-container">
                    <table id="results-table">
                        <thead>
                            <tr>
                                <th data-sort="code">コード</th>
                                <th data-sort="name">名称</th>
                                <th data-sort="price">現在値</th>
                                <th data-sort="prob">上昇確率 ⬇</th>
                                <th data-sort="moat">Moat評価</th>
                                <th data-sort="industry">業種</th>
                                <th>AI ロジック概要</th>
                            </tr>
                        </thead>
                        <tbody id="table-body">
                            <!-- Rows will be populated by JS -->
                        </tbody>
                    </table>
                </div>
            </section>
        </main>

        <footer>
            <p>© 2026 Jptungri株式会社. All analysis runs locally in your browser.</p>
        </footer>
    </div>

    <!-- Modal for details -->
    <div id="detail-modal" class="modal">
        <div class="modal-content">
            <span class="close-modal">&times;</span>
            <div id="modal-body"></div>
        </div>
    </div>

    <script src="js/stock_dataTest.js"></script>
    <script src="js/stockScriptJP.js"></script>
    <script src="js/stockMoat_dataJP.js"></script>
    <script src="js/stockScript_logic.js"></script>
</body>

</html>
