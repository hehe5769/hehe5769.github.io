<!DOCTYPE html>
<html lang="zh-JP">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JP Stock AI - 日本股市深度选股</title>
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🇯🇵</text></svg>">
    <link rel="stylesheet" href="css/stock.css">
    <!-- SheetJS for Excel parsing -->
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
</head>

<body>
    <div class="container">
        <header>
            <div class="logo">🇯🇵 JP Stock AI</div>
            <p class="subtitle">基于护城河评级与技术面量化分析的深度选股系统</p>
        </header>

        <main>
            <section class="upload-section">
                <div class="upload-box" id="drop-zone">
                    <input type="file" id="file-input" accept=".xlsx, .xls" hidden>
                    <label for="file-input" class="upload-label">
                        <span class="icon">📂</span>
                        <span class="text">点击上传 Excel 文件 (Stock.xlsx / Nikkei225.xlsx)</span>
                        <span class="sub-text">或将文件拖拽至此区域</span>
                    </label>
                </div>
                <div id="error-message" class="error-message" style="display: none;"></div>

                <div style="text-align: center; margin-top: 1rem;">
                    <button id="test-file-btn" class="btn-text">🧪 使用测试数据 (stockTest.xlsx)</button>
                </div>
            </section>

            <section id="loading-section" class="loading-section" style="display: none;">
                <div class="spinner"></div>
                <p>正在进行 AI 深度分析，请稍候...</p>
            </section>

            <section id="results-section" class="results-section" style="display: none;">
                <div class="metrics-grid">
                    <div class="metric-card">
                        <h3>分析股票</h3>
                        <div class="value" id="metric-total">0</div>
                    </div>
                    <div class="metric-card highlight">
                        <h3>高概率 (>70%)</h3>
                        <div class="value" id="metric-high-prob">0</div>
                    </div>
                    <div class="metric-card">
                        <h3>优质护城河</h3>
                        <div class="value" id="metric-high-moat">0</div>
                    </div>
                </div>

                <div class="actions-bar">
                    <input type="text" id="search-input" placeholder="🔍 搜索股票代码或名称...">
                    <button id="download-btn" class="btn primary">📥 下载分析报告 (CSV)</button>
                </div>

                <div class="table-container">
                    <table id="results-table">
                        <thead>
                            <tr>
                                <th data-sort="code">代码</th>
                                <th data-sort="name">名称</th>
                                <th data-sort="price">当前价格</th>
                                <th data-sort="prob">上升概率 ⬇</th>
                                <th data-sort="moat">护城河评级</th>
                                <th data-sort="industry">行业</th>
                                <th>AI 逻辑简述</th>
                            </tr>
                        </thead>
                        <tbody id="table-body">
                            <!-- Rows will be populated by JS -->
                        </tbody>
                    </table>
                </div>
            </section>
        </main>

        <footer>
            <p>© 2026 Jptungri株式会社. All analysis runs locally in your browser.</p>
        </footer>
    </div>

    <!-- Modal for details -->
    <div id="detail-modal" class="modal">
        <div class="modal-content">
            <span class="close-modal">&times;</span>
            <div id="modal-body"></div>
        </div>
    </div>

    <script src="js/stock_dataTest.js"></script>
    <script src="js/stockScriptCN.js"></script>
</body>

</html>
